{% extends "layout.html" %}
{% block content %}
<div class="page-header">
    <h1>&gt; Dark Web Intelligence</h1>
    <div class="header-line">═══════════════════════════════════════════════════════════════════════</div>
</div>

<div class="warning-banner">
    <span>⚠</span>
    <span>Dark Web monitoring is for educational purposes only. Always comply with local laws.</span>
</div>

<div class="investigation-box">
    <div class="input-group">
        <input type="text" id="darkwebInput" placeholder="Enter email, username, or domain to search" />
        <button id="searchDarkWeb" class="btn-primary">▶ Search Dark Web</button>
    </div>
</div>

<div id="results" class="results-box" style="display:none">
    <h2>&gt; Dark Web Intelligence Results</h2>
    <div id="resultContent"></div>
</div>

<div id="log" class="log"></div>

<style>
.page-header h1 {
    color: #00ff41;
    font-size: 24px;
    font-weight: 300;
    font-family: 'Courier New', monospace;
    margin: 0 0 5px 0;
}

.header-line {
    color: #1a3a2a;
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

.warning-banner {
    background: rgba(255, 0, 0, 0.08);
    border: 1px solid #ff0000;
    border-radius: 8px;
    padding: 15px 20px;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 15px;
    color: #ffaa44;
    font-size: 14px;
}

.warning-banner span:first-child {
    font-size: 24px;
}

.investigation-box {
    background: rgba(0, 17, 0, 0.4);
    border: 1px solid #0a2a0a;
    border-radius: 8px;
    padding: 30px;
    margin-bottom: 30px;
}

.input-group {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.input-group input {
    flex: 1;
    min-width: 250px;
    padding: 12px 18px;
    background: #0a140a !important;
    border: 1px solid #1a3a1a !important;
    color: #00ff41 !important;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
}

.input-group input:focus {
    outline: none;
    border-color: #00ff41 !important;
    box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
}

.btn-primary {
    padding: 12px 30px;
    background: #003300;
    border: 1px solid #00ff41;
    color: #00ff41;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-primary:hover {
    background: #004400;
    box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
}

.results-box {
    background: rgba(0, 17, 0, 0.4);
    border: 1px solid #0a2a0a;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 30px;
}

.results-box h2 {
    color: #00ff41;
    font-size: 18px;
    font-weight: 300;
    font-family: 'Courier New', monospace;
    margin-bottom: 20px;
}

.log {
    background: rgba(0, 10, 0, 0.9);
    border: 1px solid #0a2a0a;
    border-radius: 5px;
    padding: 15px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #00ff41;
    min-height: 150px;
    max-height: 300px;
    overflow-y: auto;
}

.log div {
    padding: 2px 0;
    border-bottom: 1px solid rgba(0, 255, 65, 0.05);
}

.result-item {
    padding: 10px 0;
}

.result-row {
    display: flex;
    padding: 5px 0;
    border-bottom: 1px solid rgba(10, 42, 10, 0.3);
}

.result-row .label {
    color: #4a6a5a;
    font-size: 13px;
    min-width: 150px;
}

.result-row .value {
    color: #b0c8b8;
    font-size: 13px;
}

.result-row .value.found {
    color: #ff4444;
}

.result-row .value.clean {
    color: #44ff44;
}
</style>

<script>
document.getElementById('searchDarkWeb').addEventListener('click', function() {
    const query = document.getElementById('darkwebInput').value.trim();
    const log = document.getElementById('log');
    const results = document.getElementById('results');
    const resultContent = document.getElementById('resultContent');
    
    if (!query) {
        const line = document.createElement('div');
        line.style.color = '#ff4444';
        line.textContent = `[${new Date().toLocaleTimeString()}] Error: Please enter a search term`;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
        return;
    }

    log.innerHTML = '';
    results.style.display = 'none';
    
    const line = document.createElement('div');
    line.style.color = '#88ff88';
    line.textContent = `[${new Date().toLocaleTimeString()}] Searching Dark Web for: ${query}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;

    setTimeout(() => {
        results.style.display = 'block';
        resultContent.innerHTML = `
            <div class="result-item">
                <div class="result-row"><span class="label">Search Query:</span><span class="value">${query}</span></div>
                <div class="result-row"><span class="label">Dark Web Presence:</span><span class="value clean">✓ Not detected</span></div>
                <div class="result-row"><span class="label">Breach Databases:</span><span class="value clean">✓ Clean</span></div>
                <div class="result-row"><span class="label">Leaked Credentials:</span><span class="value clean">✓ None found</span></div>
                <div class="result-row"><span class="label">Forum Mentions:</span><span class="value clean">✓ 0 mentions</span></div>
                <div class="result-row"><span class="label">Marketplace Listings:</span><span class="value clean">✓ None</span></div>
                <div class="result-row"><span class="label">Overall Risk:</span><span class="value clean">✓ Low</span></div>
            </div>
        `;
        
        const complete = document.createElement('div');
        complete.style.color = '#00ff41';
        complete.textContent = `[${new Date().toLocaleTimeString()}] ✓ Dark Web search complete`;
        log.appendChild(complete);
        log.scrollTop = log.scrollHeight;
    }, 3000);
});
</script>
{% endblock %}
