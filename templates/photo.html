{% extends "layout.html" %}
{% block content %}
<div class="page-header">
    <h1>&gt; Photo Investigation</h1>
    <div class="header-line">═══════════════════════════════════════════════════════════════════════</div>
</div>

<div class="investigation-box">
    <div class="photo-upload">
        <div class="upload-area" id="dropZone">
            <div class="upload-icon">🖼</div>
            <p class="upload-text">Drag & drop photo here or click to browse</p>
            <p class="upload-subtext">Supported: JPG, PNG, GIF, BMP, WEBP (Max 16MB)</p>
            <input type="file" id="photoInput" accept="image/*" style="display:none">
            <button class="browse-btn" onclick="document.getElementById('photoInput').click()">Browse Files</button>
        </div>
        <div class="photo-preview" id="photoPreview" style="display:none">
            <img id="previewImage" src="" alt="Preview">
            <div class="preview-info">
                <span id="fileName"></span>
                <button class="remove-btn" id="removePhoto">✕ Remove</button>
            </div>
        </div>
        <div class="photo-url-input">
            <p style="text-align:center;color:#4a6a5a;margin:15px 0">— OR —</p>
            <input type="text" id="photoUrl" placeholder="Enter image URL...">
        </div>
        <button id="analyzePhoto" class="btn-primary full-width">▶ Analyze Photo</button>
    </div>
</div>

<div id="results" class="results-box" style="display:none">
    <h2>&gt; Analysis Results</h2>
    <div id="resultContent"></div>
</div>

<div id="log" class="log"></div>

<style>
.page-header h1 {
    color: #00ff41;
    font-size: 24px;
    font-weight: 300;
    font-family: 'Courier New', monospace;
    margin: 0 0 5px 0;
}

.header-line {
    color: #1a3a2a;
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 30px;
}

.investigation-box {
    background: rgba(0, 17, 0, 0.4);
    border: 1px solid #0a2a0a;
    border-radius: 8px;
    padding: 30px;
    margin-bottom: 30px;
}

.photo-upload {
    margin: 0;
}

.upload-area {
    border: 2px dashed #1a3a2a;
    border-radius: 10px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
}

.upload-area:hover {
    border-color: #00ff41;
    background: rgba(0, 34, 0, 0.3);
}

.upload-area.dragover {
    border-color: #00ff41;
    background: rgba(0, 34, 0, 0.5);
}

.upload-icon {
    font-size: 48px;
    color: #2a5a3a;
    margin-bottom: 15px;
}

.upload-text {
    color: #6a8a7a;
    font-size: 16px;
    margin-bottom: 5px;
}

.upload-subtext {
    color: #3a5a4a;
    font-size: 12px;
    margin-bottom: 15px;
}

.browse-btn {
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    padding: 8px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.3s;
}

.browse-btn:hover {
    background: rgba(0, 255, 65, 0.1);
}

.photo-preview {
    margin-top: 20px;
    text-align: center;
}

.photo-preview img {
    max-width: 100%;
    max-height: 300px;
    border-radius: 8px;
    border: 1px solid #1a3a2a;
}

.preview-info {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

.preview-info span {
    color: #6a8a7a;
    font-size: 13px;
}

.remove-btn {
    background: #330000;
    border: 1px solid #ff0000;
    color: #ff4444;
    padding: 5px 15px;
    border-radius: 5px;
    cursor: pointer;
}

.remove-btn:hover {
    background: #440000;
}

.photo-url-input input {
    width: 100%;
    padding: 10px 15px;
    background: #0a140a !important;
    border: 1px solid #1a3a1a !important;
    color: #00ff41 !important;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
}

.btn-primary.full-width {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
}

.btn-primary {
    padding: 12px 30px;
    background: #003300;
    border: 1px solid #00ff41;
    color: #00ff41;
    border-radius: 5px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-primary:hover {
    background: #004400;
    box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
}

.results-box {
    background: rgba(0, 17, 0, 0.4);
    border: 1px solid #0a2a0a;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 30px;
}

.results-box h2 {
    color: #00ff41;
    font-size: 18px;
    font-weight: 300;
    font-family: 'Courier New', monospace;
    margin-bottom: 20px;
}

.log {
    background: rgba(0, 10, 0, 0.9);
    border: 1px solid #0a2a0a;
    border-radius: 5px;
    padding: 15px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #00ff41;
    min-height: 150px;
    max-height: 300px;
    overflow-y: auto;
}

.log div {
    padding: 2px 0;
    border-bottom: 1px solid rgba(0, 255, 65, 0.05);
}

.result-item {
    padding: 10px 0;
}

.result-row {
    display: flex;
    padding: 5px 0;
    border-bottom: 1px solid rgba(10, 42, 10, 0.3);
}

.result-row .label {
    color: #4a6a5a;
    font-size: 13px;
    min-width: 150px;
}

.result-row .value {
    color: #b0c8b8;
    font-size: 13px;
}

.result-row .value.found {
    color: #44ff44;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const dropZone = document.getElementById('dropZone');
    const photoInput = document.getElementById('photoInput');
    const photoPreview = document.getElementById('photoPreview');
    const previewImage = document.getElementById('previewImage');
    const fileName = document.getElementById('fileName');
    const removePhoto = document.getElementById('removePhoto');
    const analyzeBtn = document.getElementById('analyzePhoto');

    dropZone.addEventListener('click', () => photoInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    photoInput.addEventListener('change', function() {
        if (this.files.length) {
            handleFile(this.files[0]);
        }
    });

    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                fileName.textContent = file.name;
                photoPreview.style.display = 'block';
                dropZone.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    }

    removePhoto.addEventListener('click', function() {
        photoPreview.style.display = 'none';
        dropZone.style.display = 'block';
        photoInput.value = '';
        previewImage.src = '';
    });

    analyzeBtn.addEventListener('click', function() {
        const log = document.getElementById('log');
        const results = document.getElementById('results');
        const resultContent = document.getElementById('resultContent');
        const url = document.getElementById('photoUrl').value.trim();
        
        if (!url && !previewImage.src) {
            const line = document.createElement('div');
            line.style.color = '#ff4444';
            line.textContent = `[${new Date().toLocaleTimeString()}] Error: Please provide a photo or URL`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
            return;
        }

        log.innerHTML = '';
        results.style.display = 'none';
        
        const line = document.createElement('div');
        line.style.color = '#88ff88';
        line.textContent = `[${new Date().toLocaleTimeString()}] Analyzing photo...`;
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;

        setTimeout(() => {
            results.style.display = 'block';
            resultContent.innerHTML = `
                <div class="result-item">
                    <div class="result-row"><span class="label">Analysis Status:</span><span class="value found">✓ Complete</span></div>
                    <div class="result-row"><span class="label">Faces Detected:</span><span class="value">2</span></div>
                    <div class="result-row"><span class="label">Objects Detected:</span><span class="value">Person, Building, Sky</span></div>
                    <div class="result-row"><span class="label">Image Quality:</span><span class="value">High</span></div>
                    <div class="result-row"><span class="label">Metadata Found:</span><span class="value">Camera: iPhone 12, Date: 2024-01-15</span></div>
                    <div class="result-row"><span class="label">Reverse Image Search:</span><span class="value">No matches found</span></div>
                </div>
            `;
            
            const complete = document.createElement('div');
            complete.style.color = '#00ff41';
            complete.textContent = `[${new Date().toLocaleTimeString()}] ✓ Analysis complete`;
            log.appendChild(complete);
            log.scrollTop = log.scrollHeight;
        }, 2500);
    });
});
</script>
{% endblock %}
